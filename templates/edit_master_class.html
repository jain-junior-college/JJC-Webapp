{% extends "layout.html" %}

{% block title %}Edit Class{% endblock %}
{% block header_title %}Edit Academic Class{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 0 auto;">
    <h3 style="margin-bottom: 2rem; font-weight: 700;">Update Class Fees</h3>
    
    <form method="POST">
        <div class="form-group">
            <label>Class Name</label>
            <input type="text" name="name" class="form-control" value="{{ obj.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Base Fees (₹)</label>
            <input type="number" name="base_fees" class="form-control" value="{{ obj.base_fees }}" step="0.01" required>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 0.5rem;">This will be the default amount for new enrollments.</p>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            <a href="{{ url_for('masters') }}" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-secondary); text-decoration: none; text-align: center; line-height: 2.5rem; flex: 1;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
