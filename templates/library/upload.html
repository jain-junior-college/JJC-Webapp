{% extends "layout.html" %}

{% block title %}Upload Resource{% endblock %}
{% block header_title %}Contribute to Library{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <h3 style="margin-bottom: 2rem; font-weight: 700;">Upload Educational Content</h3>
    
    <form method="POST" enctype="multipart/form-data">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div class="form-group">
                <label>Resource Title</label>
                <input type="text" name="title" class="form-control" placeholder="e.g. Physics Chapter 5 Animation" required>
            </div>
            
            <div class="form-group">
                <label>Resource Type</label>
                <select name="resource_type" class="form-control" required>
                    <option value="PDF">PDF / E-Book</option>
                    <option value="Video">Video Lecture</option>
                    <option value="Animation">Animation / Media</option>
                </select>
            </div>

            <div class="form-group">
                <label>Target Class</label>
                <select name="class_id" class="form-control">
                    <option value="">All Classes</option>
                    {% for c in classes %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <select name="subject_id" class="form-control">
                    <option value="">General / Extra-Curricular</option>
                    {% for s in subjects %}
                    <option value="{{ s.id }}">{{ s.name }} ({{ s.stream.name }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label>Uploader (Teacher)</label>
                <select name="teacher_id" class="form-control">
                    {% for t in teachers %}
                    <option value="{{ t.id }}">{{ t.name }}</constraint>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label>Description (Optional)</label>
                <textarea name="description" class="form-control" rows="3" placeholder="Briefly describe what students will learn..."></textarea>
            </div>

            <div class="form-group" style="grid-column: span 2;">
                <label>Upload File (Max 10MB recommended)</label>
                <input type="file" name="file" class="form-control" required>
                <small style="color: #64748b;">Supported: PDF, MP4, MOV, GIF, PNG, JPG</small>
            </div>
        </div>

        <div style="margin-top: 3rem; display: flex; gap: 1rem; justify-content: flex-end;">
            <a href="{{ url_for('library_list') }}" class="btn">Cancel</a>
            <button type="submit" class="btn btn-primary" style="padding: 1rem 3rem;">
                <i class="fas fa-cloud-upload-alt"></i> Publish to Library
            </button>
        </div>
    </form>
</div>
{% endblock %}
