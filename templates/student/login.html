<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - JJC</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --white: #ffffff;
            --bg: #f1f5f9;
        }

        body {
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-box {
            background: var(--accent);
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: var(--primary);
        }

        h1 {
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
        }

        .alert {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .info-box {
            background: #f0f9ff;
            color: #0369a1;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 2rem;
            border: 1px solid #bae6fd;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-box">
            <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>Student Portal</h1>
        <p>Sign in to access your dashboard</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('student_login') }}">
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" name="username" placeholder="e.g. S1001" required>
            </div>
            <div class="form-group">
                <label>Password (Date of Birth)</label>
                <input type="password" name="password" placeholder="YYYY-MM-DD" required>
            </div>
            <button type="submit" class="btn-login">Enter Student Portal</button>
        </form>

        <div class="info-box">
            <i class="fas fa-info-circle"></i> Use your <strong>Student ID</strong> as username and your <strong>Date of Birth</strong> (YYYY-MM-DD) as password.
        </div>

        <div style="margin-top: 2rem;">
            <a href="{{ url_for('index') }}" style="color: #64748b; text-decoration: none; font-size: 0.9rem;">
                <i class="fas fa-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </div>

</body>
</html>
