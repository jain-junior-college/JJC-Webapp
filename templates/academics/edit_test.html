{% extends "layout.html" %}

{% block title %}Edit Scheduled Test{% endblock %}
{% block header_title %}Modify Exam Details{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem;">
        <a href="{{ url_for('test_list') }}" style="color: var(--text-secondary);"><i class="fas fa-arrow-left"></i></a>
        <h3 style="font-weight: 700; margin: 0;">Edit Scheduled Test</h3>
    </div>

    <form method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
            <div class="form-group">
                <label>Academic Class</label>
                <select name="class_id" class="form-control" required>
                    {% for c in classes %}
                    <option value="{{ c.id }}" {% if test.class_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Stream</label>
                <select name="stream_id" id="stream_id" class="form-control" required onchange="fetchSubjects()">
                    {% for s in streams %}
                    <option value="{{ s.id }}" {% if test.stream_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Exam Type</label>
                <select name="exam_type" class="form-control" required>
                    {% for opt in ["Unit Test - I", "Mid-term Examination", "Unit Test - II", "Final Examination", "Prelim - 1", "Prelim - 2"] %}
                    <option value="{{ opt }}" {% if test.exam_type == opt %}selected{% endif %}>{{ opt }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <select name="subject_id" id="subject_id" class="form-control" required>
                    {% for s in subjects %}
                    <option value="{{ s.id }}" {% if test.subject_id == s.id %}selected{% endif %}>{{ s.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Test Date</label>
                <input type="date" name="date" class="form-control" value="{{ test.test_date }}" required>
            </div>

            <div class="form-group">
                <label>Time Duration</label>
                <input type="text" name="duration" class="form-control" value="{{ test.duration or '' }}" placeholder="eg: 1.5 Hours">
            </div>

            <div class="form-group">
                <label>Total Marks</label>
                <input type="number" name="total_marks" class="form-control" value="{{ test.total_marks }}" step="0.5" required oninput="suggestPassing(this)">
            </div>

            <div class="form-group">
                <label>Passing Marks</label>
                <input type="number" name="passing_marks" id="passing_marks" class="form-control" value="{{ test.passing_marks }}" step="0.5" required>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
            <a href="{{ url_for('test_list') }}" class="btn" style="background: rgba(0,0,0,0.05); color: var(--text-secondary); text-decoration: none; padding: 10px 20px;">Cancel</a>
            <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem;">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </div>
    </form>
</div>

<script>
    function fetchSubjects() {
        const streamId = document.getElementById('stream_id').value;
        const subjectSelect = document.getElementById('subject_id');
        
        fetch(`/api/subjects/${streamId}`)
            .then(r => r.json())
            .then(subjects => {
                subjectSelect.innerHTML = '';
                subjects.forEach(s => {
                    const option = document.createElement('option');
                    option.value = s.id;
                    option.text = s.name;
                    subjectSelect.appendChild(option);
                });
            });
    }

    function suggestPassing(inputElem) {
        const total = parseFloat(inputElem.value);
        const passingInput = document.getElementById('passing_marks');
        if (!isNaN(total)) {
            const suggested = Math.ceil((total * 0.35) * 2) / 2;
            passingInput.value = suggested;
        }
    }
</script>
{% endblock %}
