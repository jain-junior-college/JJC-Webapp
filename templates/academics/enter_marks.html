{% extends "layout.html" %}

{% block title %}Enter Marks{% endblock %}
{% block header_title %}Academic Records{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-bottom: 2rem; font-weight: 700;">Record Examination Results</h3>
    <form method="POST">
        <div class="form-group">
            <label for="student_id">Select Student</label>
            <select name="student_id" id="student_id" class="form-control" required>
                <option value="" disabled selected>Choose a student...</option>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }} ({{ student.student_id }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" name="subject" id="subject" class="form-control" placeholder="e.g. Mathematics" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="marks">Marks Obtained</label>
                <input type="number" step="0.1" name="marks" id="marks" class="form-control" placeholder="0.0" required>
            </div>
            <div class="form-group">
                <label for="total_marks">Total Marks</label>
                <input type="number" step="0.1" name="total_marks" id="total_marks" class="form-control" value="100" required>
            </div>
        </div>

        <div class="form-group">
            <label for="exam_type">Examination Type</label>
            <select name="exam_type" id="exam_type" class="form-control">
                <option value="Unit Test - I">Unit Test - I</option>
                <option value="Mid-term Examination">Mid-term Examination</option>
                <option value="Unit Test - II">Unit Test - II</option>
                <option value="Final Examination">Final Examination</option>
            </select>
        </div>

        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Save Results</button>
        </div>
    </form>
</div>
{% endblock %}
