name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

# Only one build at a time — cancel any in-progress run on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Validate the Python web app ─────────────────────────────────────
  validate-web:
    name: Validate Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py models.py
        
  # ── Job 2: Build Android APK (runs after validate-web succeeds) ────────────
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: validate-web          # ← waits for Job 1 to pass
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x android_app/gradlew
        continue-on-error: true

      - name: Build with Gradle
        working-directory: android_app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jjc-app-debug
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
